name: Minecraft Forge 1.20.1 Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # Executa a cada 5 horas (limite do Actions é 6h)

jobs:
  run-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget
          
      - name: Download Forge Installer
        run: |
          wget https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.4.10/forge-1.20.1-47.4.10-installer.jar -O forge-installer.jar
          
      - name: Install Forge Server
        run: |
          java -jar forge-installer.jar --installServer
          rm forge-installer.jar
          
      - name: Prepare Server Files
        run: |
          # Garante que o eula.txt e server.properties existam no diretório atual
          [ -f "eula.txt" ] || echo "eula=true" > eula.txt
          
          # Cria diretório de mods se não existir
          mkdir -p mods
          
          # Se você colocou os mods na pasta 'mods' do repositório, eles já estão aqui.
          # Caso tenha usado outro nome, este comando garante a cópia:
          if [ -d "mods" ]; then
            echo "Pasta de mods detectada."
          fi
          
      - name: Start Pinggy Tunnel
        id: pinggy
        run: |
          # Inicia o túnel TCP usando Pinggy
          ssh -p 443 -R0:localhost:25565 tcp@a.pinggy.io -o StrictHostKeyChecking=no -o ServerAliveInterval=30 > pinggy_out.txt 2>&1 &
          
          echo "Aguardando IP do túnel..."
          for i in {1..12}; do
            sleep 5
            IP_PORT=$(grep -oP '(?<=tcp://)[a-zA-Z0-9.-]+:[0-9]+' pinggy_out.txt | head -n 1)
            if [ ! -z "$IP_PORT" ]; then
              echo "SERVER_IP=$IP_PORT" >> $GITHUB_ENV
              echo "IP_FOUND=true" >> $GITHUB_ENV
              echo "IP do Servidor: $IP_PORT"
              break
            fi
          done
          
      - name: Run Minecraft Server
        run: |
          echo "Iniciando servidor Minecraft..."
          # Inicia o servidor em background e redireciona o log para um arquivo
          java @user_jvm_args.txt -Xms4G -Xmx6G -jar forge-1.20.1-47.4.10-shim.jar nogui > server.log 2>&1 &
          SERVER_PID=$!
          
          echo "Aguardando o servidor carregar (isso pode levar alguns minutos)..."
          # Monitora o log até encontrar a mensagem de sucesso
          timeout 600s bash -c 'until grep -q "Done (" server.log; do sleep 5; done' || echo "Tempo limite de espera excedido, mas continuando..."
          
          echo "Servidor parece estar online! Enviando e-mail..."
          echo "SERVER_READY=true" >> $GITHUB_ENV
          
          # Mantém o processo rodando e mostra os logs no console
          tail -f server.log &
          TAIL_PID=$!
          
          # Roda por 5 horas e 20 minutos
          sleep 19200
          
          echo "Tempo limite atingido. Desligando servidor..."
          kill $SERVER_PID
          wait $SERVER_PID || true
          kill $TAIL_PID
          
      - name: Send Email with Server IP
        if: env.IP_FOUND == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Seu Servidor Minecraft está Online!"
          to: "pabloluizgz@gmail.com"
          from: "GitHub Actions Minecraft Server"
          body: |
            Olá!
            
            Seu servidor Minecraft Forge 1.20.1 foi iniciado.
            
            IP de Conexão: ${{ env.SERVER_IP }}
            
            Nota: Se não conseguir conectar imediatamente, aguarde 2-3 minutos para o Forge terminar de carregar os mods.
            
            Bom jogo!
          
      - name: Save World Data
        if: always()
        run: |
          # Configura o git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adiciona o mundo e outras configurações alteradas (ignora se não existirem)
          git add world/ 2>/dev/null || true
          git add banned-ips.json banned-players.json ops.json whitelist.json usercache.json 2>/dev/null || true
          
          # Faz o commit e push se houver mudanças
          if git diff --staged --quiet; then
            echo "Nenhuma mudança no mundo para salvar."
          else
            git commit -m "Auto-save: Atualização do mundo e configurações [skip ci]"
            git push
          fi
